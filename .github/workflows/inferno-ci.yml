name: Inferno CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run CI-safe deploy preflight
        run: |
          python3 inferno_deploy_preflight.py --profile ci --timeout-seconds 180

      - name: Upload preflight reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inferno-preflight
          path: |
            reports/deploy_preflight_latest.txt
            data/inferno_deploy_preflight.json
